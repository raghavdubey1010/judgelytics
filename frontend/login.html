<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Judgelytics</title>
  <meta name="description" content="Sign in to your Judgelytics account to access AI-powered consumer case analysis." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- Background orbs -->
<div style="position:fixed;inset:0;pointer-events:none;z-index:0;">
  <div style="position:absolute;top:20%;left:30%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.1) 0%,transparent 70%);"></div>
  <div style="position:absolute;bottom:10%;right:20%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,0.06) 0%,transparent 70%);"></div>
</div>

<div class="auth-page" style="position:relative;z-index:1;">
  <div class="auth-card card card-lg animate-in">

    <!-- Logo -->
    <div class="auth-logo">
      <div style="font-size:2.5rem;">⚖️</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your Judgelytics account</p>
    </div>

    <!-- Alert -->
    <div id="formAlert" style="display:none;" class="mb-16"></div>

    <!-- Form -->
    <form id="loginForm">
      <div class="flex-col gap-16">

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" name="email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative;">
            <input class="form-control" type="password" id="password" name="password"
                   placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" id="togglePwd"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
              👁️
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" style="display:none;" class="spinner"></span>
        </button>

      </div>
    </form>

    <div class="auth-sep"><span>New to Judgelytics?</span></div>

    <a href="register.html" class="btn btn-ghost btn-full">
      Create Free Account
    </a>

    <div style="text-align:center; margin-top:20px;">
      <a href="index.html" style="font-size:0.82rem; color:var(--text-muted);">← Back to Home</a>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  Auth.requireGuest();

  const form    = document.getElementById('loginForm');
  const btn     = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  const spinner = document.getElementById('loginSpinner');
  const alert   = document.getElementById('formAlert');
  const pwdInput = document.getElementById('password');

  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', function() {
    const isText = pwdInput.type === 'text';
    pwdInput.type = isText ? 'password' : 'text';
    this.textContent = isText ? '👁️' : '🙈';
  });

  function showAlert(msg, type = 'error') {
    const colors = {
      error:   'rgba(239,68,68,0.12)',
      success: 'rgba(16,185,129,0.12)'
    };
    const textColors = { error: 'var(--danger-light)', success: 'var(--success)' };
    alert.style.display = 'block';
    alert.style.background = colors[type];
    alert.style.border = `1px solid ${textColors[type]}40`;
    alert.style.color = textColors[type];
    alert.style.padding = '12px 16px';
    alert.style.borderRadius = 'var(--radius-sm)';
    alert.style.fontSize = '0.875rem';
    alert.textContent = msg;
  }

  function setLoading(on) {
    btn.disabled = on;
    btnText.textContent = on ? 'Signing in…' : 'Sign In';
    spinner.style.display = on ? '' : 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alert.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = pwdInput.value;

    if (!email || !password) {
      showAlert('Please fill in all fields.');
      return;
    }

    setLoading(true);
    try {
      const data = await AuthAPI.login(email, password);
      Auth.login(data);
      Toast.success('Welcome back!', `Hello, ${data.name.split(' ')[0]}!`);
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (err) {
      showAlert(err.message || 'Login failed. Please try again.');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
